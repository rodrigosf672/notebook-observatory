name: Daily observatory

# Runs the full daily census: collect -> aggregate -> rebuild dashboard ->
# commit datasets & site -> publish to GitHub Pages. Designed to require no
# manual intervention. Failures are surfaced but never leave the repo in a
# broken state (data commits and Pages deploy are independent steps).

on:
  schedule:
    # 06:17 UTC daily. Off-the-hour to avoid GitHub's top-of-hour congestion.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Optional run date (YYYY-MM-DD); defaults to today (UTC)."
        required: false
        default: ""

# Allow the workflow to commit data back and deploy Pages.
permissions:
  contents: write
  pages: write
  id-token: write

# Never run two collection jobs at once (they both write datasets/).
concurrency:
  group: daily-observatory
  cancel-in-progress: false

jobs:
  collect-and-build:
    runs-on: ubuntu-latest
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run daily collection
        id: collect
        env:
          # The default GITHUB_TOKEN gives the workflow 5000 core + 30 search
          # requests/hour — sufficient for the configured collection budget.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NBOBS_TARGET_NOTEBOOKS: "400"
          NBOBS_REPO_SAMPLE: "150"
          NBOBS_LOG_LEVEL: "INFO"
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            nbobs collect --date "${{ github.event.inputs.date }}"
          else
            nbobs collect
          fi

      - name: Rebuild dashboard
        run: nbobs dashboard --repo-url "https://github.com/${{ github.repository }}"

      - name: Run tests (guard against regressions)
        run: pip install -e ".[dev]" && pytest -q
        continue-on-error: true

      - name: Commit updated datasets and site
        id: commit
        run: |
          git config user.name "notebook-observatory-bot"
          git config user.email "actions@github.com"
          git add datasets/ site/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "data: daily snapshot ${DATE} [skip ci]"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: collect-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
